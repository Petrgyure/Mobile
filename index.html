<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HAD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      text-transform: uppercase;
    }

    h1 {
      color: #e94560;
      font-size: 2rem;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }

    #score-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 10px;
      font-size: 1.1rem;
      color: #eee;
    }
    #score-bar span { font-weight: bold; padding: 4px 14px; border-radius: 20px; }
    .player-score { color: #0f3460; background: #e94560; }
    .enemy-score { color: #0f3460; background: #5e60ce; }

    canvas {
      border: 3px solid #e94560;
      border-radius: 12px;
      background: #16213e;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
    }

    #joystick-area {
      position: relative;
      width: 160px;
      height: 160px;
      margin-top: 16px;
    }

    #joystick-base {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(233, 69, 96, 0.15);
      border: 3px solid rgba(233, 69, 96, 0.4);
    }

    #joystick-knob {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #e94560;
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.5);
      left: 48px;
      top: 48px;
      transition: none;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #overlay.hidden { display: none; }
    #overlay h2 { color: #e94560; font-size: 2.2rem; margin-bottom: 10px; }
    #overlay p  { color: #eee; font-size: 1.2rem; margin-bottom: 20px; }

    #play-btn {
      padding: 14px 48px;
      font-size: 1.3rem;
      border: none;
      border-radius: 30px;
      background: #e94560;
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 0 #a8324a;
      -webkit-tap-highlight-color: transparent;
    }
    #play-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a8324a; }
  </style>
</head>
<body>

<h1>HAD</h1>
<div id="score-bar">
  TY: <span class="player-score" id="score">0</span>
  SOUPER: <span class="enemy-score" id="enemy-score">0</span>
  NEJLEPSI: <span class="player-score" id="best">0</span>
</div>
<canvas id="game"></canvas>

<div id="joystick-area">
  <div id="joystick-base"></div>
  <div id="joystick-knob"></div>
</div>

<div id="overlay">
  <h2 id="overlay-title">HAD</h2>
  <p id="overlay-msg">SBIREJ JABLKA, VYHNI SE SOUPEROVI!</p>
  <button id="play-btn">HRAT</button>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const TILE = 24;
  const COLS = 15;
  const ROWS = 15;
  canvas.width = COLS * TILE;
  canvas.height = ROWS * TILE;

  const scoreEl = document.getElementById('score');
  const enemyScoreEl = document.getElementById('enemy-score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayMsg = document.getElementById('overlay-msg');
  const playBtn = document.getElementById('play-btn');

  let snake, dir, nextDir, food, score, best, speed, alive;
  let enemy, enemyDir, enemyScore;
  let lastTick, tickAccum, animFrame;

  best = parseInt(localStorage.getItem('snakeBest') || '0', 10);
  bestEl.textContent = best;

  // Previous positions for smooth interpolation
  let prevSnake, prevEnemy;

  function init() {
    const mid = Math.floor(COLS / 2);
    snake = [
      { x: mid, y: Math.floor(ROWS / 2) },
      { x: mid - 1, y: Math.floor(ROWS / 2) },
      { x: mid - 2, y: Math.floor(ROWS / 2) },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    prevSnake = snake.map(s => ({ ...s }));

    enemy = [
      { x: mid, y: Math.floor(ROWS / 2) - 4 },
      { x: mid + 1, y: Math.floor(ROWS / 2) - 4 },
      { x: mid + 2, y: Math.floor(ROWS / 2) - 4 },
    ];
    enemyDir = { x: -1, y: 0 };
    prevEnemy = enemy.map(s => ({ ...s }));
    enemyScore = 0;
    enemyScoreEl.textContent = 0;

    score = 0;
    speed = 220;
    alive = true;
    scoreEl.textContent = 0;
    lastTick = 0;
    tickAccum = 0;
    placeFood();
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (
      snake.some(s => s.x === pos.x && s.y === pos.y) ||
      enemy.some(s => s.x === pos.x && s.y === pos.y)
    );
    food = pos;
  }

  function isOccupied(x, y) {
    return snake.some(s => s.x === x && s.y === y) ||
           enemy.some(s => s.x === x && s.y === y);
  }

  function updateEnemyDir() {
    const head = enemy[0];

    const moves = [
      { x: 1, y: 0 },
      { x: -1, y: 0 },
      { x: 0, y: 1 },
      { x: 0, y: -1 },
    ];

    const validMoves = moves.filter(m => !(m.x === -enemyDir.x && m.y === -enemyDir.y));

    let bestMove = null;
    let bestScore = -Infinity;

    for (const m of validMoves) {
      const wnx = ((head.x + m.x) % COLS + COLS) % COLS;
      const wny = ((head.y + m.y) % ROWS + ROWS) % ROWS;
      if (isOccupied(wnx, wny)) continue;

      const dist = Math.abs(food.x - wnx) + Math.abs(food.y - wny);
      const moveScore = -dist;

      if (moveScore > bestScore) {
        bestScore = moveScore;
        bestMove = m;
      }
    }

    if (bestMove && Math.random() < 0.15) {
      const safeMoves = validMoves.filter(m => {
        const nx = ((head.x + m.x) % COLS + COLS) % COLS;
        const ny = ((head.y + m.y) % ROWS + ROWS) % ROWS;
        return !isOccupied(nx, ny);
      });
      if (safeMoves.length > 0) {
        bestMove = safeMoves[Math.floor(Math.random() * safeMoves.length)];
      }
    }

    if (bestMove) {
      enemyDir = bestMove;
    }
  }

  function tick() {
    // Save previous positions for interpolation
    prevSnake = snake.map(s => ({ ...s }));
    prevEnemy = enemy.map(s => ({ ...s }));

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wrap around walls
    if (head.x < 0) head.x = COLS - 1;
    if (head.x >= COLS) head.x = 0;
    if (head.y < 0) head.y = ROWS - 1;
    if (head.y >= ROWS) head.y = 0;

    // Self or enemy collision
    if (snake.some(s => s.x === head.x && s.y === head.y) ||
        enemy.some(s => s.x === head.x && s.y === head.y)) {
      gameOver(false);
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snakeBest', best);
      }
      placeFood();
      if (speed > 120) {
        speed -= 3;
      }
      // Pad prevSnake to match new length
      prevSnake.unshift({ ...prevSnake[0] });
    } else {
      snake.pop();
    }

    // Enemy turn
    updateEnemyDir();
    const eHead = { x: enemy[0].x + enemyDir.x, y: enemy[0].y + enemyDir.y };

    // Wrap enemy
    if (eHead.x < 0) eHead.x = COLS - 1;
    if (eHead.x >= COLS) eHead.x = 0;
    if (eHead.y < 0) eHead.y = ROWS - 1;
    if (eHead.y >= ROWS) eHead.y = 0;

    if (snake.some(s => s.x === eHead.x && s.y === eHead.y) ||
        enemy.some(s => s.x === eHead.x && s.y === eHead.y)) {
      respawnEnemy();
      prevEnemy = enemy.map(s => ({ ...s }));
    } else {
      enemy.unshift(eHead);

      if (eHead.x === food.x && eHead.y === food.y) {
        enemyScore++;
        enemyScoreEl.textContent = enemyScore;
        placeFood();
        prevEnemy.unshift({ ...prevEnemy[0] });
      } else {
        enemy.pop();
      }
    }

    if (score >= 15) {
      gameOver(true);
      return;
    }
    if (enemyScore >= 15) {
      gameOver(false);
      return;
    }
  }

  function respawnEnemy() {
    let sy;
    do {
      sy = Math.floor(Math.random() * (ROWS - 4)) + 2;
    } while (snake.some(s => s.y === sy && s.x >= 1 && s.x <= 3));

    enemy = [
      { x: 3, y: sy },
      { x: 2, y: sy },
      { x: 1, y: sy },
    ];
    enemyDir = { x: 1, y: 0 };
  }

  // Smooth interpolation helper
  function lerp(a, b, t) {
    // Handle wrap-around: if distance > half the grid, don't interpolate
    const dx = b - a;
    if (Math.abs(dx) > 2) return b;
    return a + dx * t;
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * TILE, 0); ctx.lineTo(i * TILE, canvas.height); ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
      ctx.beginPath(); ctx.moveTo(0, i * TILE); ctx.lineTo(canvas.width, i * TILE); ctx.stroke();
    }

    // Food
    ctx.font = `${TILE - 2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\uD83C\uDF4E', food.x * TILE + TILE / 2, food.y * TILE + TILE / 2 + 1);

    // Draw snake with interpolation
    function drawSnake(segments, prev, snakeDir, colorFn) {
      const len = segments.length;
      for (let i = 0; i < len; i++) {
        const cur = segments[i];
        const prv = prev[i] || cur;
        const sx = lerp(prv.x, cur.x, t) * TILE;
        const sy = lerp(prv.y, cur.y, t) * TILE;

        const ratio = 1 - i / (len + 5);
        const col = colorFn(ratio);
        ctx.fillStyle = col;

        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(sx + pad, sy + pad, TILE - pad * 2, TILE - pad * 2, 5);
        ctx.fill();

        // Eyes on head
        if (i === 0) {
          ctx.fillStyle = '#fff';
          const ex = sx + TILE / 2 + snakeDir.x * 4;
          const ey = sy + TILE / 2 + snakeDir.y * 4;
          ctx.beginPath(); ctx.arc(ex - snakeDir.y * 3, ey + snakeDir.x * 3, 2.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex + snakeDir.y * 3, ey - snakeDir.x * 3, 2.5, 0, Math.PI * 2); ctx.fill();
        }
      }
    }

    // Player snake (red/green)
    drawSnake(snake, prevSnake, dir, ratio => {
      const r = Math.round(46 + 187 * ratio);
      const g = Math.round(204 * (1 - ratio));
      const b = Math.round(96 * ratio);
      return `rgb(${r},${g},${b})`;
    });

    // Enemy snake (purple/blue)
    drawSnake(enemy, prevEnemy, enemyDir, ratio => {
      const r = Math.round(94 * ratio);
      const g = Math.round(96 * ratio);
      const b = Math.round(120 + 136 * ratio);
      return `rgb(${r},${g},${b})`;
    });

    // Score target
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${score}/15  VS  ${enemyScore}/15`, canvas.width / 2, ROWS * TILE - 6);
  }

  function gameOver(won) {
    alive = false;
    cancelAnimationFrame(animFrame);
    if (won) {
      overlayTitle.textContent = 'VYHRAL JSI!';
      overlayMsg.textContent = `SKORE: ${score} - SOUPER: ${enemyScore}`;
    } else {
      overlayTitle.textContent = 'KONEC HRY!';
      if (enemyScore >= 15) {
        overlayMsg.textContent = `SOUPER VYHRAL! ${score} - ${enemyScore}`;
      } else {
        overlayMsg.textContent = `SKORE: ${score} - SOUPER: ${enemyScore}`;
      }
    }
    playBtn.textContent = 'HRAT ZNOVU';
    overlay.classList.remove('hidden');
  }

  // Game loop using requestAnimationFrame for smooth rendering
  function gameLoop(timestamp) {
    if (!alive) return;

    if (!lastTick) lastTick = timestamp;
    const dt = timestamp - lastTick;
    lastTick = timestamp;
    tickAccum += dt;

    while (tickAccum >= speed) {
      tick();
      if (!alive) return;
      tickAccum -= speed;
    }

    // Interpolation factor (0 to 1 between ticks)
    const t = Math.min(tickAccum / speed, 1);
    draw(t);

    animFrame = requestAnimationFrame(gameLoop);
  }

  function start() {
    overlay.classList.add('hidden');
    init();
    draw(1);
    lastTick = 0;
    tickAccum = 0;
    animFrame = requestAnimationFrame(gameLoop);
  }

  // Input
  function setDir(x, y) {
    if (!alive) return;
    if (dir.x === -x && dir.y === -y) return;
    nextDir = { x, y };
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp':    case 'w': setDir(0, -1); break;
      case 'ArrowDown':  case 's': setDir(0,  1); break;
      case 'ArrowLeft':  case 'a': setDir(-1, 0); break;
      case 'ArrowRight': case 'd': setDir(1,  0); break;
    }
  });

  // Joystick
  const joystickArea = document.getElementById('joystick-area');
  const joystickKnob = document.getElementById('joystick-knob');
  const KNOB_REST_X = 48;
  const KNOB_REST_Y = 48;
  const KNOB_MAX = 40;
  let joystickActive = false;
  let joystickTouchId = null;

  function handleJoystick(clientX, clientY) {
    const rect = joystickArea.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Clamp to max radius
    if (dist > KNOB_MAX) {
      dx = dx / dist * KNOB_MAX;
      dy = dy / dist * KNOB_MAX;
    }

    joystickKnob.style.left = (KNOB_REST_X + dx) + 'px';
    joystickKnob.style.top = (KNOB_REST_Y + dy) + 'px';

    // Only register direction if pushed far enough
    if (dist > 15) {
      if (Math.abs(dx) > Math.abs(dy)) {
        setDir(dx > 0 ? 1 : -1, 0);
      } else {
        setDir(0, dy > 0 ? 1 : -1);
      }
    }
  }

  function resetJoystick() {
    joystickActive = false;
    joystickTouchId = null;
    joystickKnob.style.left = KNOB_REST_X + 'px';
    joystickKnob.style.top = KNOB_REST_Y + 'px';
  }

  joystickArea.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystickActive = true;
    joystickTouchId = touch.identifier;
    handleJoystick(touch.clientX, touch.clientY);
  }, { passive: false });

  joystickArea.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        handleJoystick(touch.clientX, touch.clientY);
      }
    }
  }, { passive: false });

  joystickArea.addEventListener('touchend', e => {
    for (const touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        resetJoystick();
      }
    }
  });

  joystickArea.addEventListener('touchcancel', resetJoystick);

  // Mouse support for joystick (desktop testing)
  joystickArea.addEventListener('mousedown', e => {
    joystickActive = true;
    handleJoystick(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', e => {
    if (joystickActive) handleJoystick(e.clientX, e.clientY);
  });
  document.addEventListener('mouseup', () => {
    if (joystickActive) resetJoystick();
  });

  // Swipe on canvas still works
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  });

  playBtn.addEventListener('click', start);
</script>
</body>
</html>
