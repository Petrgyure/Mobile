<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HAD</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      text-transform: uppercase;
    }

    h1 {
      color: #e94560;
      font-size: 2rem;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }

    #score-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 10px;
      font-size: 1.1rem;
      color: #eee;
    }
    #score-bar span { font-weight: bold; padding: 4px 14px; border-radius: 20px; }
    .player-score { color: #0f3460; background: #e94560; }
    .enemy-score { color: #0f3460; background: #5e60ce; }

    canvas {
      border: 3px solid #e94560;
      border-radius: 12px;
      background: #16213e;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
    }

    #joystick-area {
      position: relative;
      width: 160px;
      height: 160px;
      margin-top: 16px;
    }
    #joystick-area.hidden { display: none; }

    #joystick-base {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(233, 69, 96, 0.15);
      border: 3px solid rgba(233, 69, 96, 0.4);
    }

    #joystick-knob {
      position: absolute;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #e94560;
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.5);
      left: 48px;
      top: 48px;
    }

    #controls {
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down .";
      gap: 8px;
      margin-top: 16px;
    }
    #controls.hidden { display: none; }

    .ctrl-btn {
      width: 80px;
      height: 80px;
      border: none;
      border-radius: 18px;
      background: #e94560;
      color: white;
      font-size: 2.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 0 #a8324a;
      transition: transform 0.05s;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a8324a; }

    #btn-up    { grid-area: up; }
    #btn-left  { grid-area: left; }
    #btn-right { grid-area: right; }
    #btn-down  { grid-area: down; }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #overlay.hidden { display: none; }
    #overlay h2 { color: #e94560; font-size: 2.2rem; margin-bottom: 10px; }
    #overlay p  { color: #eee; font-size: 1.2rem; margin-bottom: 20px; }

    .menu-section {
      margin-bottom: 18px;
      text-align: center;
    }
    .menu-section label {
      color: #aaa;
      font-size: 0.85rem;
      display: block;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .menu-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .menu-btn {
      padding: 10px 16px;
      font-size: 0.95rem;
      border: 2px solid #e94560;
      border-radius: 14px;
      background: transparent;
      color: #eee;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
      text-transform: uppercase;
    }
    .menu-btn.active {
      background: #e94560;
      color: white;
    }

    #play-btn {
      padding: 14px 48px;
      font-size: 1.3rem;
      border: none;
      border-radius: 30px;
      background: #e94560;
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 0 #a8324a;
      -webkit-tap-highlight-color: transparent;
      margin-top: 6px;
    }
    #play-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a8324a; }

    #menu-settings { display: none; }
    #menu-settings.show { display: block; }
  </style>
</head>
<body>

<h1>HAD</h1>
<div id="score-bar">
  TY: <span class="player-score" id="score">0</span>
  SOUPER: <span class="enemy-score" id="enemy-score">0</span>
  NEJLEPSI: <span class="player-score" id="best">0</span>
</div>
<canvas id="game"></canvas>

<div id="joystick-area" class="hidden">
  <div id="joystick-base"></div>
  <div id="joystick-knob"></div>
</div>

<div id="controls" class="hidden">
  <button class="ctrl-btn" id="btn-up">&#9650;</button>
  <button class="ctrl-btn" id="btn-left">&#9664;</button>
  <button class="ctrl-btn" id="btn-right">&#9654;</button>
  <button class="ctrl-btn" id="btn-down">&#9660;</button>
</div>

<div id="overlay">
  <h2 id="overlay-title">HAD</h2>
  <p id="overlay-msg">SBIREJ JABLKA, VYHNI SE SOUPEROVI!</p>

  <div id="menu-settings" class="show">
    <div class="menu-section">
      <label>OVLADANI</label>
      <div class="menu-row">
        <button class="menu-btn active" data-ctrl="joystick">JOYSTICK</button>
        <button class="menu-btn" data-ctrl="dpad">TLACITKA</button>
        <button class="menu-btn" data-ctrl="swipe">SWIPE</button>
      </div>
    </div>

    <div class="menu-section">
      <label>OBTIZNOST</label>
      <div class="menu-row">
        <button class="menu-btn active" data-diff="novy">NOVY</button>
        <button class="menu-btn" data-diff="pokrocily">POKROCILY</button>
        <button class="menu-btn" data-diff="expert">EXPERT</button>
      </div>
    </div>
  </div>

  <button id="play-btn">HRAT</button>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const TILE = 24;
  const COLS = 15;
  const ROWS = 15;
  canvas.width = COLS * TILE;
  canvas.height = ROWS * TILE;

  const scoreEl = document.getElementById('score');
  const enemyScoreEl = document.getElementById('enemy-score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayMsg = document.getElementById('overlay-msg');
  const playBtn = document.getElementById('play-btn');
  const menuSettings = document.getElementById('menu-settings');
  const joystickAreaEl = document.getElementById('joystick-area');
  const controlsEl = document.getElementById('controls');

  let snake, dir, nextDir, food, score, best, speed, alive;
  let enemy, enemyDir, enemyScore;
  let lastTick, tickAccum, animFrame;
  let prevSnake, prevEnemy;

  // Game settings
  let controlType = 'joystick';
  let difficulty = 'novy';

  // Level features
  let portals = [];  // pairs: [{a:{x,y}, b:{x,y}, color}]
  let walls = [];    // [{x,y}]
  let portalSpawnTimer = 0;
  let wallSpawnTimer = 0;

  best = parseInt(localStorage.getItem('snakeBest') || '0', 10);
  bestEl.textContent = best;

  // Menu button handling
  document.querySelectorAll('.menu-btn[data-ctrl]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.menu-btn[data-ctrl]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      controlType = btn.dataset.ctrl;
    });
  });

  document.querySelectorAll('.menu-btn[data-diff]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.menu-btn[data-diff]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      difficulty = btn.dataset.diff;
    });
  });

  const PORTAL_COLORS = [
    ['#00e5ff', '#00b8d4'],
    ['#ff9100', '#e65100'],
    ['#76ff03', '#64dd17'],
    ['#ea80fc', '#aa00ff'],
    ['#ffd600', '#f9a825'],
  ];

  function randomFreeCell() {
    let pos;
    let tries = 0;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      tries++;
    } while (tries < 200 && (
      snake.some(s => s.x === pos.x && s.y === pos.y) ||
      enemy.some(s => s.x === pos.x && s.y === pos.y) ||
      walls.some(w => w.x === pos.x && w.y === pos.y) ||
      portals.some(p => (p.a.x === pos.x && p.a.y === pos.y) || (p.b.x === pos.x && p.b.y === pos.y)) ||
      (food && food.x === pos.x && food.y === pos.y)
    ));
    return pos;
  }

  function createStaticPortals() {
    portals = [];
    // Place 3 portal pairs for pokrocily
    const pairs = 3;
    for (let i = 0; i < pairs; i++) {
      const a = randomFreeCell();
      const b = randomFreeCell();
      portals.push({ a, b, color: PORTAL_COLORS[i % PORTAL_COLORS.length] });
    }
  }

  function createExpertWalls() {
    walls = [];
    // Place some initial random walls
    const count = 8 + Math.floor(Math.random() * 5);
    for (let i = 0; i < count; i++) {
      const w = randomFreeCell();
      walls.push(w);
    }
  }

  function spawnRandomPortal() {
    if (portals.length >= 5) {
      // Remove oldest
      portals.shift();
    }
    const a = randomFreeCell();
    const b = randomFreeCell();
    portals.push({ a, b, color: PORTAL_COLORS[portals.length % PORTAL_COLORS.length] });
  }

  function spawnRandomWalls() {
    // Add 2-4 walls, remove some old ones if too many
    if (walls.length > 20) {
      walls.splice(0, 3);
    }
    const count = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      walls.push(randomFreeCell());
    }
  }

  function init() {
    const mid = Math.floor(COLS / 2);
    snake = [
      { x: mid, y: Math.floor(ROWS / 2) },
      { x: mid - 1, y: Math.floor(ROWS / 2) },
      { x: mid - 2, y: Math.floor(ROWS / 2) },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    prevSnake = snake.map(s => ({ ...s }));

    enemy = [
      { x: mid, y: Math.floor(ROWS / 2) - 4 },
      { x: mid + 1, y: Math.floor(ROWS / 2) - 4 },
      { x: mid + 2, y: Math.floor(ROWS / 2) - 4 },
    ];
    enemyDir = { x: -1, y: 0 };
    prevEnemy = enemy.map(s => ({ ...s }));
    enemyScore = 0;
    enemyScoreEl.textContent = 0;

    score = 0;
    speed = 220;
    alive = true;
    scoreEl.textContent = 0;
    lastTick = 0;
    tickAccum = 0;

    portals = [];
    walls = [];
    portalSpawnTimer = 0;
    wallSpawnTimer = 0;

    if (difficulty === 'pokrocily') {
      createStaticPortals();
    } else if (difficulty === 'expert') {
      createStaticPortals();
      createExpertWalls();
    }

    placeFood();
  }

  function placeFood() {
    let pos;
    let tries = 0;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      tries++;
    } while (tries < 200 && (
      snake.some(s => s.x === pos.x && s.y === pos.y) ||
      enemy.some(s => s.x === pos.x && s.y === pos.y) ||
      walls.some(w => w.x === pos.x && w.y === pos.y) ||
      portals.some(p => (p.a.x === pos.x && p.a.y === pos.y) || (p.b.x === pos.x && p.b.y === pos.y))
    ));
    food = pos;
  }

  function isOccupied(x, y) {
    return snake.some(s => s.x === x && s.y === y) ||
           enemy.some(s => s.x === x && s.y === y) ||
           walls.some(w => w.x === x && w.y === y);
  }

  function checkPortal(pos) {
    for (const p of portals) {
      if (p.a.x === pos.x && p.a.y === pos.y) {
        pos.x = p.b.x;
        pos.y = p.b.y;
        return true;
      }
      if (p.b.x === pos.x && p.b.y === pos.y) {
        pos.x = p.a.x;
        pos.y = p.a.y;
        return true;
      }
    }
    return false;
  }

  function isWall(x, y) {
    return walls.some(w => w.x === x && w.y === y);
  }

  function updateEnemyDir() {
    const head = enemy[0];

    const moves = [
      { x: 1, y: 0 },
      { x: -1, y: 0 },
      { x: 0, y: 1 },
      { x: 0, y: -1 },
    ];

    const validMoves = moves.filter(m => !(m.x === -enemyDir.x && m.y === -enemyDir.y));

    let bestMove = null;
    let bestMoveScore = -Infinity;

    for (const m of validMoves) {
      const wnx = ((head.x + m.x) % COLS + COLS) % COLS;
      const wny = ((head.y + m.y) % ROWS + ROWS) % ROWS;
      if (isOccupied(wnx, wny)) continue;

      const dist = Math.abs(food.x - wnx) + Math.abs(food.y - wny);
      const moveScore = -dist;

      if (moveScore > bestMoveScore) {
        bestMoveScore = moveScore;
        bestMove = m;
      }
    }

    if (bestMove && Math.random() < 0.15) {
      const safeMoves = validMoves.filter(m => {
        const nx = ((head.x + m.x) % COLS + COLS) % COLS;
        const ny = ((head.y + m.y) % ROWS + ROWS) % ROWS;
        return !isOccupied(nx, ny);
      });
      if (safeMoves.length > 0) {
        bestMove = safeMoves[Math.floor(Math.random() * safeMoves.length)];
      }
    }

    if (bestMove) {
      enemyDir = bestMove;
    }
  }

  function tick() {
    prevSnake = snake.map(s => ({ ...s }));
    prevEnemy = enemy.map(s => ({ ...s }));

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wrap around walls
    if (head.x < 0) head.x = COLS - 1;
    if (head.x >= COLS) head.x = 0;
    if (head.y < 0) head.y = ROWS - 1;
    if (head.y >= ROWS) head.y = 0;

    // Hit a wall block
    if (isWall(head.x, head.y)) {
      gameOver(false);
      return;
    }

    // Check portal
    checkPortal(head);

    // Self or enemy collision
    if (snake.some(s => s.x === head.x && s.y === head.y) ||
        enemy.some(s => s.x === head.x && s.y === head.y)) {
      gameOver(false);
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('snakeBest', best);
      }
      placeFood();
      if (speed > 120) {
        speed -= 3;
      }
      prevSnake.unshift({ ...prevSnake[0] });
    } else {
      snake.pop();
    }

    // Enemy turn
    updateEnemyDir();
    const eHead = { x: enemy[0].x + enemyDir.x, y: enemy[0].y + enemyDir.y };

    if (eHead.x < 0) eHead.x = COLS - 1;
    if (eHead.x >= COLS) eHead.x = 0;
    if (eHead.y < 0) eHead.y = ROWS - 1;
    if (eHead.y >= ROWS) eHead.y = 0;

    // Enemy hits wall or collision — respawn
    if (isWall(eHead.x, eHead.y) ||
        snake.some(s => s.x === eHead.x && s.y === eHead.y) ||
        enemy.some(s => s.x === eHead.x && s.y === eHead.y)) {
      respawnEnemy();
      prevEnemy = enemy.map(s => ({ ...s }));
    } else {
      checkPortal(eHead);
      enemy.unshift(eHead);

      if (eHead.x === food.x && eHead.y === food.y) {
        enemyScore++;
        enemyScoreEl.textContent = enemyScore;
        placeFood();
        prevEnemy.unshift({ ...prevEnemy[0] });
      } else {
        enemy.pop();
      }
    }

    // Expert mode: randomly spawn portals and walls over time
    if (difficulty === 'expert') {
      portalSpawnTimer++;
      wallSpawnTimer++;
      if (portalSpawnTimer >= 25) {
        portalSpawnTimer = 0;
        spawnRandomPortal();
      }
      if (wallSpawnTimer >= 15) {
        wallSpawnTimer = 0;
        spawnRandomWalls();
      }
    }

    if (score >= 15) {
      gameOver(true);
      return;
    }
    if (enemyScore >= 15) {
      gameOver(false);
      return;
    }
  }

  function respawnEnemy() {
    let sy, sx;
    let tries = 0;
    do {
      sx = Math.floor(Math.random() * (COLS - 4)) + 2;
      sy = Math.floor(Math.random() * (ROWS - 4)) + 2;
      tries++;
    } while (tries < 100 && (
      isOccupied(sx, sy) || isOccupied(sx - 1, sy) || isOccupied(sx - 2, sy)
    ));

    enemy = [
      { x: sx, y: sy },
      { x: sx - 1, y: sy },
      { x: sx - 2, y: sy },
    ];
    enemyDir = { x: 1, y: 0 };
  }

  function lerp(a, b, t) {
    const dx = b - a;
    if (Math.abs(dx) > 2) return b;
    return a + dx * t;
  }

  function draw(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * TILE, 0); ctx.lineTo(i * TILE, canvas.height); ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
      ctx.beginPath(); ctx.moveTo(0, i * TILE); ctx.lineTo(canvas.width, i * TILE); ctx.stroke();
    }

    // Walls
    for (const w of walls) {
      ctx.fillStyle = '#4a4e69';
      ctx.beginPath();
      ctx.roundRect(w.x * TILE + 1, w.y * TILE + 1, TILE - 2, TILE - 2, 4);
      ctx.fill();
      ctx.strokeStyle = '#6c757d';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Portals
    const now = Date.now();
    for (const p of portals) {
      const pulse = 0.6 + 0.4 * Math.sin(now / 300);
      // Portal A
      ctx.fillStyle = p.color[0];
      ctx.globalAlpha = pulse;
      ctx.beginPath();
      ctx.arc(p.a.x * TILE + TILE / 2, p.a.y * TILE + TILE / 2, TILE / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      // Inner glow
      ctx.fillStyle = p.color[1];
      ctx.beginPath();
      ctx.arc(p.a.x * TILE + TILE / 2, p.a.y * TILE + TILE / 2, TILE / 4, 0, Math.PI * 2);
      ctx.fill();

      // Portal B
      ctx.fillStyle = p.color[0];
      ctx.beginPath();
      ctx.arc(p.b.x * TILE + TILE / 2, p.b.y * TILE + TILE / 2, TILE / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = p.color[1];
      ctx.beginPath();
      ctx.arc(p.b.x * TILE + TILE / 2, p.b.y * TILE + TILE / 2, TILE / 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;

      // Draw line connecting portals (subtle)
      ctx.strokeStyle = p.color[0];
      ctx.globalAlpha = 0.1;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(p.a.x * TILE + TILE / 2, p.a.y * TILE + TILE / 2);
      ctx.lineTo(p.b.x * TILE + TILE / 2, p.b.y * TILE + TILE / 2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    // Food
    ctx.font = `${TILE - 2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\uD83C\uDF4E', food.x * TILE + TILE / 2, food.y * TILE + TILE / 2 + 1);

    // Draw snake helper
    function drawSnake(segments, prev, snakeDir, colorFn) {
      const len = segments.length;
      for (let i = 0; i < len; i++) {
        const cur = segments[i];
        const prv = prev[i] || cur;
        const sx = lerp(prv.x, cur.x, t) * TILE;
        const sy = lerp(prv.y, cur.y, t) * TILE;

        const ratio = 1 - i / (len + 5);
        ctx.fillStyle = colorFn(ratio);

        const pad = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(sx + pad, sy + pad, TILE - pad * 2, TILE - pad * 2, 5);
        ctx.fill();

        if (i === 0) {
          ctx.fillStyle = '#fff';
          const ex = sx + TILE / 2 + snakeDir.x * 4;
          const ey = sy + TILE / 2 + snakeDir.y * 4;
          ctx.beginPath(); ctx.arc(ex - snakeDir.y * 3, ey + snakeDir.x * 3, 2.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex + snakeDir.y * 3, ey - snakeDir.x * 3, 2.5, 0, Math.PI * 2); ctx.fill();
        }
      }
    }

    drawSnake(snake, prevSnake, dir, ratio => {
      const r = Math.round(46 + 187 * ratio);
      const g = Math.round(204 * (1 - ratio));
      const b = Math.round(96 * ratio);
      return `rgb(${r},${g},${b})`;
    });

    drawSnake(enemy, prevEnemy, enemyDir, ratio => {
      const r = Math.round(94 * ratio);
      const g = Math.round(96 * ratio);
      const b = Math.round(120 + 136 * ratio);
      return `rgb(${r},${g},${b})`;
    });

    // Score target
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${score}/15  VS  ${enemyScore}/15`, canvas.width / 2, ROWS * TILE - 6);

    // Difficulty label
    const diffLabel = difficulty === 'novy' ? 'NOVY' : difficulty === 'pokrocily' ? 'POKROCILY' : 'EXPERT';
    ctx.fillText(diffLabel, canvas.width / 2, 12);
  }

  function gameOver(won) {
    alive = false;
    cancelAnimationFrame(animFrame);
    if (won) {
      overlayTitle.textContent = 'VYHRAL JSI!';
      overlayMsg.textContent = `SKORE: ${score} - SOUPER: ${enemyScore}`;
    } else {
      overlayTitle.textContent = 'KONEC HRY!';
      if (enemyScore >= 15) {
        overlayMsg.textContent = `SOUPER VYHRAL! ${score} - ${enemyScore}`;
      } else {
        overlayMsg.textContent = `SKORE: ${score} - SOUPER: ${enemyScore}`;
      }
    }
    playBtn.textContent = 'HRAT ZNOVU';
    menuSettings.classList.add('show');
    overlay.classList.remove('hidden');
  }

  function loopGame(timestamp) {
    if (!alive) return;

    if (!lastTick) lastTick = timestamp;
    const dt = timestamp - lastTick;
    lastTick = timestamp;
    tickAccum += dt;

    while (tickAccum >= speed) {
      tick();
      if (!alive) return;
      tickAccum -= speed;
    }

    const t = Math.min(tickAccum / speed, 1);
    draw(t);

    animFrame = requestAnimationFrame(loopGame);
  }

  function start() {
    overlay.classList.add('hidden');
    menuSettings.classList.remove('show');

    // Show correct controller
    joystickAreaEl.classList.add('hidden');
    controlsEl.classList.add('hidden');
    if (controlType === 'joystick') {
      joystickAreaEl.classList.remove('hidden');
    } else if (controlType === 'dpad') {
      controlsEl.classList.remove('hidden');
    }
    // swipe = no visible controller

    init();
    draw(1);
    lastTick = 0;
    tickAccum = 0;
    animFrame = requestAnimationFrame(loopGame);
  }

  // Input
  function setDir(x, y) {
    if (!alive) return;
    if (dir.x === -x && dir.y === -y) return;
    nextDir = { x, y };
  }

  // Keyboard
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowUp':    case 'w': setDir(0, -1); break;
      case 'ArrowDown':  case 's': setDir(0,  1); break;
      case 'ArrowLeft':  case 'a': setDir(-1, 0); break;
      case 'ArrowRight': case 'd': setDir(1,  0); break;
    }
  });

  // D-pad
  document.getElementById('btn-up').addEventListener('click',    () => setDir(0, -1));
  document.getElementById('btn-down').addEventListener('click',  () => setDir(0,  1));
  document.getElementById('btn-left').addEventListener('click',  () => setDir(-1, 0));
  document.getElementById('btn-right').addEventListener('click', () => setDir(1,  0));

  // Joystick
  const joystickArea = document.getElementById('joystick-area');
  const joystickKnob = document.getElementById('joystick-knob');
  const KNOB_REST_X = 48;
  const KNOB_REST_Y = 48;
  const KNOB_MAX = 40;
  let joystickActive = false;
  let joystickTouchId = null;

  function handleJoystick(clientX, clientY) {
    const rect = joystickArea.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > KNOB_MAX) {
      dx = dx / dist * KNOB_MAX;
      dy = dy / dist * KNOB_MAX;
    }

    joystickKnob.style.left = (KNOB_REST_X + dx) + 'px';
    joystickKnob.style.top = (KNOB_REST_Y + dy) + 'px';

    if (dist > 15) {
      if (Math.abs(dx) > Math.abs(dy)) {
        setDir(dx > 0 ? 1 : -1, 0);
      } else {
        setDir(0, dy > 0 ? 1 : -1);
      }
    }
  }

  function resetJoystick() {
    joystickActive = false;
    joystickTouchId = null;
    joystickKnob.style.left = KNOB_REST_X + 'px';
    joystickKnob.style.top = KNOB_REST_Y + 'px';
  }

  joystickArea.addEventListener('touchstart', e => {
    e.preventDefault();
    const touch = e.changedTouches[0];
    joystickActive = true;
    joystickTouchId = touch.identifier;
    handleJoystick(touch.clientX, touch.clientY);
  }, { passive: false });

  joystickArea.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        handleJoystick(touch.clientX, touch.clientY);
      }
    }
  }, { passive: false });

  joystickArea.addEventListener('touchend', e => {
    for (const touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) resetJoystick();
    }
  });
  joystickArea.addEventListener('touchcancel', resetJoystick);

  joystickArea.addEventListener('mousedown', e => {
    joystickActive = true;
    handleJoystick(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', e => {
    if (joystickActive) handleJoystick(e.clientX, e.clientY);
  });
  document.addEventListener('mouseup', () => {
    if (joystickActive) resetJoystick();
  });

  // Swipe on canvas
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  });

  playBtn.addEventListener('click', start);
</script>
</body>
</html>
